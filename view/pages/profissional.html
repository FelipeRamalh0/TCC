<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Profissional - First Step Dev</title>

  <link rel="stylesheet" href="../css/profissional.css">
</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <h2>First Step Dev</h2>

    <button onclick="mostrarSecao('dashboard')">
      Dashboard
    </button>

    <button onclick="mostrarSecao('criarTarefa')">
      Criar Tarefa
    </button>

    <button onclick="mostrarSecao('avaliacoes')">
      Avaliações
    </button>

    <button onclick="mostrarSecao('perfil')">
      Meu Perfil
    </button>

    <button onclick="logout()">
      Logout
    </button>

  </div>

  <!-- CONTEÚDO -->

  <div class="content">

    <!-- DASHBOARD -->

    <section id="dashboard" class="section active">

      <h1>Minhas Tarefas</h1>

      <div class="cards" id="containerTarefas">

      </div>

    </section>

    <!-- CRIAR TAREFA -->

    <section id="criarTarefa" class="section">

      <h1>Criar Nova Tarefa</h1>

      <form id="formTarefa">

        <input 
          type="text"
          id="titulo"
          placeholder="Título da tarefa"
          required
        >

        <textarea
          id="descricao"
          placeholder="Descrição da tarefa"
          required
        ></textarea>

        <select id="nivel">

          <option value="facil">Fácil</option>

          <option value="medio">Médio</option>

          <option value="dificil">Difícil</option>

        </select>

        <input
          type="text"
          id="categoria"
          placeholder="Categoria"
        >

        <button type="submit">
          Publicar Tarefa
        </button>

      </form>

    </section>

    <!-- AVALIAÇÕES -->

    <section id="avaliacoes" class="section">

      <h1>Avaliar Entregas</h1>

      <div class="cards" id="containerAvaliacoes">

      </div>

    </section>

    <!-- PERFIL -->

    <section id="perfil" class="section">

      <div class="perfil">

        <h2>Meu Perfil</h2>

        <textarea
          id="bio"
          placeholder="Escreva sua bio..."
        ></textarea>

        <button onclick="salvarBio()">
          Salvar Bio
        </button>

      </div>

    </section>

  </div>

  <script src="../scripts/profissional.js"></script>

</body>
</html>
