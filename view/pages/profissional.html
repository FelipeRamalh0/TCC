<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Painel Profissional</title>

    <link rel="stylesheet" href="../css/profissional.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body>
    <div id="notificacao" class="notificacao"></div>

    <div class="container">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <h2>First Step Dev</h2>

        <nav>
          <button onclick="trocarPagina('dashboard')">
            <i class="fa-solid fa-house"></i>
            Dashboard
          </button>

          <button onclick="trocarPagina('atividades')">
            <i class="fa-solid fa-list-check"></i>
            Atividades
          </button>

          <button onclick="trocarPagina('desempenho')">
            <i class="fa-solid fa-chart-line"></i>
            Entregas
          </button>

          <button onclick="abrirModal()">Sair</button>

          <button onclick="abrirModalExcluir()">Excluir conta</button>
        </nav>
      </aside>

      <!-- CONTEÚDO -->
      <div class="main-content">

        <!-- DASHBOARD -->
        <section id="dashboard" class="pagina ativa">

          <button class="profile-btn">
            <i class="fa-solid fa-user-tie"></i>
            Professor
          </button>

          <section class="cards">
            <div class="card">
              <h3 id="totalAtividades">0</h3>
              <p>Atividades enviadas</p>
            </div>

            <div class="card">
              <h3 id="totalEntregas">0</h3>
              <p>Entregas recebidas</p>
            </div>
          </section>

        </section>

        <!-- ATIVIDADES -->
        <section id="atividades" class="pagina">

          <section class="atividade-form">
            <h2>Criar nova atividade</h2>

            <form id="formTarefa">
              <input type="text" id="titulo" placeholder="Título da tarefa" required />

              <textarea id="descricao" placeholder="Descrição da tarefa" required></textarea>

              <select id="nivel" required>
                <option value="facil">Fácil</option>
                <option value="medio">Médio</option>
                <option value="dificil">Difícil</option>
              </select>

              <input type="text" id="categoria" placeholder="Categoria" />

              <button type="submit">Enviar atividade</button>
            </form>
          </section>

          <section class="lista">
            <h2>Atividades enviadas</h2>
            <div id="listaAtividades"></div>
          </section>

        </section>

        <!-- ENTREGAS -->
        <section id="desempenho" class="pagina">
          <h1>Entregas dos Aprendizes</h1>
        </section>

      </div>
    </div>

    <!-- MODAL SAIR -->
    <div id="modalSair" class="modal">
      <div class="modal-box">
        <h2>Tem certeza que deseja sair?</h2>

        <div class="modal-botoes">
          <button class="btn-sim" onclick="confirmarSaida()">Sim</button>
          <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- MODAL EXCLUIR CONTA -->
    <div id="modalExcluirConta" class="modal">
      <div class="modal-box">

        <h2>Excluir conta</h2>
        <p>Digite <strong>EXCLUIR</strong> para confirmar:</p>

        <input
          type="text"
          id="confirmarExclusaoInput"
          placeholder="Digite EXCLUIR"
        />

        <div class="modal-botoes">
          <button class="btn-sim" onclick="confirmarExclusaoConta()">
            Excluir
          </button>

          <button class="btn-cancelar" onclick="fecharModalExcluir()">
            Cancelar
          </button>
        </div>

      </div>
    </div>

    <!-- JS -->
    <script src="../scripts/profissional.js"></script>

  </body>
</html>
